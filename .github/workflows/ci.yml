name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: tender_monitor
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: test_password
      DB_NAME: tender_monitor
      OPENAI_API_KEY: dummy
      GEMINI_API_KEY: dummy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax compile check
        run: |
          python -m py_compile main.py
          find api core database intelligence pipeline scrapers scripts -name "*.py" -print0 | xargs -0 -n1 python -m py_compile

      - name: Run tests
        run: |
          pytest -q

      - name: Run deterministic chat guardrail eval
        run: |
          python scripts/chat_eval_runner.py --json-out artifacts/chat_eval_ci.json
